name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: django-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Bash syntax
        run: bash -n scripts/django-bootstrap.sh tests/test-cli.sh

      - name: Run CLI safety tests
        run: bash tests/test-cli.sh

      - name: Run ShellCheck
        run: |
          docker run --rm \
            -v "$PWD":/mnt \
            -w /mnt \
            koalaman/shellcheck-alpine:v0.10.0 \
            shellcheck --shell=bash scripts/django-bootstrap.sh tests/test-cli.sh
